<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Chat Logger</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 420px;
      min-height: 300px;
      max-height: 600px;
      font-family: 'Google Sans', Roboto, sans-serif;
      font-size: 14px;
      background: #f8f9fa;
      color: #202124;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a73e8;
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      flex: 1;
    }

    header .count {
      font-size: 12px;
      opacity: 0.85;
      background: rgba(255,255,255,0.2);
      padding: 2px 8px;
      border-radius: 12px;
    }

    .toolbar {
      padding: 6px 12px;
      background: white;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .toolbar .result-info {
      font-size: 12px;
      color: #5f6368;
    }

    .toolbar button {
      font-size: 12px;
      color: #c5221f;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .toolbar button:hover {
      background: #fce8e6;
    }

    #log-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }

    .log-item {
      padding: 10px 14px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.15s;
    }

    .log-item:hover {
      background: #e8f0fe;
    }

    .log-item .title {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .log-item .meta {
      font-size: 11px;
      color: #5f6368;
      display: flex;
      gap: 8px;
    }

    .log-item .snippet {
      font-size: 12px;
      color: #3c4043;
      margin-top: 4px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .log-item .actions {
      display: none;
      gap: 6px;
      margin-top: 6px;
    }

    .log-item:hover .actions {
      display: flex;
    }

    .log-item .actions button {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid;
      cursor: pointer;
      background: none;
    }

    .log-item .actions .btn-dl {
      color: #1a73e8;
      border-color: #1a73e8;
    }

    .log-item .actions .btn-dl:hover {
      background: #e8f0fe;
    }

    .log-item .actions .btn-del {
      color: #c5221f;
      border-color: #c5221f;
    }

    .log-item .actions .btn-del:hover {
      background: #fce8e6;
    }

    .empty {
      padding: 40px 16px;
      text-align: center;
      color: #5f6368;
    }

    .empty .icon {
      font-size: 36px;
      margin-bottom: 8px;
    }

    /* 詳細モーダル */
    #detail-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      overflow-y: auto;
    }

    #detail-modal.open {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px;
    }

    .modal-box {
      background: white;
      border-radius: 8px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .modal-header {
      background: #1a73e8;
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-header h2 {
      font-size: 14px;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .modal-header button {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }

    .modal-body {
      padding: 12px 14px;
      max-height: 400px;
      overflow-y: auto;
    }

    .turn {
      margin-bottom: 12px;
    }

    .turn .role {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 3px;
    }

    .turn.user .role { color: #1a73e8; }
    .turn.model .role { color: #188038; }

    .turn .content {
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .turn + .turn {
      border-top: 1px solid #f0f0f0;
      padding-top: 10px;
    }
  </style>
</head>
<body>
  <header>
    <span>💬</span>
    <h1>Gemini Chat Logger</h1>
    <span class="count" id="total-count">0件</span>
  </header>

  <div class="toolbar">
    <span class="result-info" id="log-count-info"></span>
    <button id="clear-all-btn">すべて削除</button>
  </div>

  <div id="log-list"></div>

  <!-- 詳細モーダル -->
  <div id="detail-modal">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modal-title"></h2>
        <button id="modal-close">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
