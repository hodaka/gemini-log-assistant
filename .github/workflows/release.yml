name: Release

on:
  push:
    tags:
      - 'v*'
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create extension ZIP
        run: |
          zip gemini-log-assistant.zip \
            manifest.json \
            content.js \
            content.css \
            icon16.png \
            icon48.png \
            icon128.png \
            _locales/en/messages.json \
            _locales/ja/messages.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: gemini-log-assistant.zip
